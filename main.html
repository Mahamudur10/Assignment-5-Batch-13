<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github_Issue_Tracker</title>

    <!-- tailwind + daisyUi -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome cdn -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/webfont/1.6.28/webfontloader.js"
        integrity="sha512-v/wOVTkoU7mXEJC3hXnw9AA6v32qzpknvuUF6J2Lbkasxaxn2nYcl+HGB7fr/kChGfCqubVr1n2sq1UFu3Gh1w=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <!-- geist fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- link css -->
    <link rel="stylesheet" href="./style/style.css">
</head>

<body class="bg-gray-100">
    <!-- Navbar -->
    <div class="navbar bg-white shadow-sm px-8">
        <div class="flex-1 flex items-center gap-2">
            <img src="./assets/github-logo.png" class="w-6">
            <a class="font-semibold text-lg">GitHub Issues Tracker</a>
        </div>
        <div class="flex gap-3">
            <input type="text" placeholder="Search issues..." class="input input-bordered w-64" />
            <button class="btn bg-[#4a00ff] text-white border-none">+ New Issue</button>
        </div>
    </div>

    <!-- Main Container -->
    <div class="w-8/12 mx-auto mt-8">
        <div class="bg-white p-4 rounded-lg shadow-sm mb-6">
            <div class="tabs tabs-boxed w-fit">
                <button class="tab tab-active bg-[#4a00ff] text-white">All</button>
                <button class="tab">Open</button>
                <button class="tab">Closed</button>
            </div>
        </div>
</body>

</html>
