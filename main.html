<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github_Issue_Tracker</title>

    <!-- tailwind + daisyUi -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- geist fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- link css -->
    <link rel="stylesheet" href="./style/style.css">
</head>

<body class="bg-gray-100">
    <!-- Navbar -->
    <div class="navbar bg-white shadow-sm px-8">
        <div class="flex-1 flex items-center gap-2">
            <img src="./assets/github-logo.png" class="w-6">
            <a class="font-semibold text-lg">GitHub Issues Tracker</a>
        </div>
        <div class="flex gap-3">
            <input type="text" placeholder="Search issues..." class="input input-bordered w-64" />
            <button class="btn bg-[#4a00ff] text-white border-none">+ New Issue</button>
        </div>
    </div>

    <!-- Main Container -->
    <div class="w-8/12 mx-auto mt-8">
        <div class="bg-white p-4 rounded-lg shadow-sm mb-6">
            <div class="tabs tabs-boxed w-fit">
                <button class="tab tab-active bg-[#4a00ff] text-white">All</button>
                <button class="tab">Open</button>
                <button class="tab">Closed</button>
            </div>
        </div>

        <!--  Count div -->

        <div class="bg-white p-6 rounded-lg shadow-sm mb-6 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-[#ece4ff] p-2 rounded-full">
                    <img src="./assets/Aperture.png" alt="">
                </div>
                <div>
                    <h2 class="font-semibold text-lg">50 Issues</h2>
                    <p class="text-sm text-gray-500">Track and manage your project issues</p>
                </div>
            </div>

            <div class="flex gap-4 text-sm">
                <p class="flex items-center gap-2"><span class="w-2 h-2 bg-green-500 rounded-full"></span>Open</p>
                <p class="flex items-center gap-2"><span class="w-2 h-2 bg-purple-500 rounded-full"></span>Closed</p>
            </div>
        </div>

        <!-- Issues Grid -->
        <div id="issues-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            
            <!-- Card -->
            <div class="card bg-white shadow-sm border-t-4 border-green-500">

                <div class="card-body p-4">
                    <div class="flex gap-1 justify-between items-center">
                        <img src="./assets/Open-Status.png" alt="">
                        <span class="px-6 py-1 bg-[#feecec] text-[#ef4444] rounded-full text-center">HIGH</span>
                    </div>
                    <h3 class="font-semibold text-sm">Fix Navigation Menu On Mobile Devices</h3>

                    <p class="text-xs text-gray-500 line-clamp-2">The navigation menu doesn't collapse properly on
                        mobile devices.</p>

                    <div class="flex gap-2 mt-2">
                        <span class="badge badge-error badge-sm bg-[#feecec] text-[#ef4444] py-3 rounded-full"><i
                                class="fa-solid fa-bug"></i> BUG</span>
                        <span class="badge badge-warning badge-sm bg-[#fff8db] text-[#db7f13] py-3 rounded-full"><i
                                class="fa-regular fa-life-ring"></i>HELP WANTED</span>
                    </div>

                    <div class="border-t border-gray-100 mt-3">

                        <p class="text-xs text-gray-400 mt-3">#1 by john_doe</p>
                        <p class="text-xs text-gray-400">1/15/2024</p>
                    </div>


                </div>

            </div>

        </div>

    </div>

    <script src="./script/main.js"></script>
</body>

</html>
