<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github_Issue_Tracker</title>

    <!-- tailwind + daisyUi -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- geist fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- link css -->
    <link rel="stylesheet" href="./style/style.css">
</head>

<body class="bg-gray-100">
    <!-- Navbar -->
    <div class="navbar bg-white shadow-sm px-4 md:px-8">
        <div class="flex-1 flex items-center gap-2">
            <img src="./assets/github-logo.png" class="w-6">
            <a class="font-semibold text-lg">GitHub Issues Tracker</a>
        </div>
        <div class="flex flex-col md:flex-row gap-3">
            <input type="text" placeholder="Search issues..." class="input input-bordered w-full md:w-64" />
            <button class="btn bg-[#4a00ff] text-white border-none">Search</button>
        </div>
    </div>

    <!-- Main Container -->
    <div class="w-11/12 md:w-10/12 lg:w-8/12 mx-auto mt-8">
        <!-- Tabs -->
        <div class="bg-white p-4 rounded-lg shadow-sm mb-6">
            <div class="tabs w-fit gap-2">
                <button class="tab tab-active bg-[#4a00ff] text-white border border-gray-200 rounded-lg">All</button>
                <button class="tab border border-gray-200 rounded-lg">Open</button>
                <button class="tab border border-gray-200 rounded-lg">Closed</button>
            </div>
        </div>

        <!-- Count div -->
        <div class="bg-white p-6 rounded-lg shadow-sm mb-6 flex flex-col md:flex-row gap-4 justify-between md:items-center">
            <div class="flex items-center gap-3">
                <div class="bg-[#ece4ff] p-2 rounded-full">
                    <img src="./assets/Aperture.png" alt="">
                </div>
                <div class="issues-count">
                    <h2 class="font-semibold text-lg">0 Issues</h2>
                    <p class="text-sm text-gray-500">Track and manage your project issues</p>
                </div>
            </div>

            <div class="flex gap-4 text-sm issues-status">
                <p class="flex items-center gap-2">
                    <span class="w-2 h-2 bg-green-500 rounded-full"></span>
                    Open
                </p>
                <p class="flex items-center gap-2">
                    <span class="w-2 h-2 bg-purple-500 rounded-full"></span>
                    Closed
                </p>
            </div>
        </div>

        <!-- Loading Spinner -->
        <div id="loading-spinner" class="flex justify-center items-center py-10 hidden">
            <span class="loading loading-dots loading-xl text-[#4a00ff]"></span>
        </div>

        <!-- Issues Grid -->
        <div id="issues-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 min-h-[200px]">
            <!-- Issues dynamically added here -->
        </div>

    </div>

    <!-- Issue Details Modal -->
    <dialog id="issue-modal" class="modal">
        <div class="modal-box max-w-lg">
            <h3 id="modal-title" class="font-bold text-lg"></h3>
            <p id="modal-description" class="py-3 text-sm text-gray-600"></p>

            <div class="flex flex-wrap gap-2 mt-2" id="modal-labels">
                <!-- labels dynamically inserted here -->
            </div>

            <div class="flex justify-between text-xs text-gray-400 mt-3">
                <span id="modal-author"></span>
                <span id="modal-date"></span>
            </div>

            <div class="modal-action">
                <form method="dialog">
                    <button class="btn">Close</button>
                </form>
            </div>
        </div>
    </dialog>

    <script src="./script/main.js"></script>
</body>

</html>
