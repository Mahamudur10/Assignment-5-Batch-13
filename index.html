<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github_Issue_Tracker</title>

    <!-- tailwind + daisyUi -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome cdn -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/webfont/1.6.28/webfontloader.js"
        integrity="sha512-v/wOVTkoU7mXEJC3hXnw9AA6v32qzpknvuUF6J2Lbkasxaxn2nYcl+HGB7fr/kChGfCqubVr1n2sq1UFu3Gh1w=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <!-- geist fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- link css -->
    <link rel="stylesheet" href="./style/style.css">
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="card w-full max-w-md bg-white shadow-lg p-8">

        <div class="flex justify-center mb-4">
            <img src="./assets/github-logo.png" class="w-16">
        </div>

        <h2 class="text-center text-xl font-semibold">GitHub Issues Tracker</h2>
        <p class="text-center text-gray-500 text-sm mb-6">Sign in to manage your issues</p>

        <div class="form-control mb-4">
            <label class="label"><span class="label-text">Username</span></label>
            <input id="input-user" type="text" placeholder="Enter Username" class="input input-bordered w-full" />
            <p class="text-[#4a00ff] text-xs mt-1">Default: admin</p>
        </div>

        <div class="form-control mb-5">
            <label class="label"><span class="label-text">Password</span></label>
            <input id="input-pass" type="password" placeholder="Enter Password" class="input input-bordered w-full" />
            <p class="text-[#4a00ff] text-xs mt-1">Default: admin123</p>
        </div>

        <button id="loginBtn" class="btn btn-primary text-white border-none hover:bg-[#3a00cc]">Sign In</button>

        <div class="divider text-sm">OR</div>
        <div class="p-4 rounded text-center text-sm">
            <p class="font-semibold mb-2 text-[#9ea8b7]">Demo Credentials:</p>
            <div class="bg-gray-100 py-6 rounded-md">
                <p><b>Username:</b> admin</p>
                <p><b>Password:</b> admin123</p>
            </div>
        </div>
    </div>

    <script src="./script/login.js"></script>
</body>

</html>
